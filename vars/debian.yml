cache_timeout: 600

_blazar_package_names_condition: >-
  {{
    (
      (ansible_facts['distribution'] | lower == 'debian' and ansible_facts['distribution_major_version'] is version('14', '>=')) or
        (ansible_facts['distribution'] | lower == 'ubuntu' and ansible_facts['distribution_version'] is version('26.04', '>='))
    )
  }}

blazar_distro_packages:
  - git
  - "{{ _blazar_package_names_condition | ternary('libxml2-16', 'libxml2') }}"

blazar_devel_distro_packages:
  - build-essential
  - libxml2-dev
  - libsystemd-dev
  - pkg-config
